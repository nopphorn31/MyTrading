<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockTrader Pro</title>
  
  <!-- โหลด Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- โหลด React และ ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- โหลด Babel สำหรับแปลง JSX ในเบราว์เซอร์ -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- โหลด Firebase (Compat Version สำหรับ HTML ไฟล์เดียว) -->
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

  <style>
    /* ซ่อน Scrollbar เพื่อความสวยงาม */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    body { background-color: #131722; color: #d1d4dc; font-family: sans-serif; margin: 0; overflow: hidden; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // ==========================================
    // ไอคอน SVG แบบ Inline (แทนการใช้ lucide-react)
    // ==========================================
    const Activity = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;
    const LayoutDashboard = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"></rect><rect width="7" height="5" x="14" y="3" rx="1"></rect><rect width="7" height="9" x="14" y="12" rx="1"></rect><rect width="7" height="5" x="3" y="16" rx="1"></rect></svg>;
    const Briefcase = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>;
    const SettingsIcon = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>;
    const SearchIcon = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>;
    const PlusIcon = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"></path><path d="M12 5v14"></path></svg>;
    const ArrowUpRight = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 7h10v10"></path><path d="M7 17 17 7"></path></svg>;
    const ArrowDownRight = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 17h10V7"></path><path d="M7 7l10 10"></path></svg>;
    const DollarSign = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="2" y2="22"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>;
    const TrendingUp = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline><polyline points="16 7 22 7 22 13"></polyline></svg>;
    const AlertCircle = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" x2="12" y1="8" y2="12"></line><line x1="12" x2="12.01" y1="16" y2="16"></line></svg>;
    const KeyIcon = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="7.5" cy="15.5" r="5.5"></circle><path d="m21 2-9.6 9.6"></path><path d="m15.5 7.5 3 3L22 7l-3-3"></path></svg>;
    const RefreshCw = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>;

    // ==========================================
    // FIREBASE SETUP & CONFIGURATION
    // หากต้องการใช้ระบบฐานข้อมูล ให้แก้ไข Config ตรงนี้
    // ==========================================
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    let app = null;
    let auth = null;
    let db = null;

    // เช็คว่าผู้ใช้ใส่ Config จริงหรือยัง
    if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
      app = firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();
      db = firebase.firestore();
    }

    // ==========================================
    // MOCK DATA & ASSETS (11 ตัว)
    // ==========================================
    const ASSETS = [
      { symbol: 'CRWV', name: 'CoreWeave Inc', basePrice: 85, volatility: 0.035 },
      { symbol: 'MSTR', name: 'MicroStrategy Inc', basePrice: 1450, volatility: 0.045 },
      { symbol: 'CRWD', name: 'CrowdStrike Holdings', basePrice: 320, volatility: 0.025 },
      { symbol: 'RKLB', name: 'Rocket Lab USA', basePrice: 5.5, volatility: 0.040 },
      { symbol: 'PLTR', name: 'Palantir Technologies', basePrice: 24, volatility: 0.030 },
      { symbol: 'NVO', name: 'Novo Nordisk', basePrice: 125, volatility: 0.015 },
      { symbol: 'UNH', name: 'UnitedHealth Group', basePrice: 510, volatility: 0.012 },
      { symbol: 'NVDA', name: 'NVIDIA Corp', basePrice: 850, volatility: 0.025 },
      { symbol: 'MSFT', name: 'Microsoft Corp', basePrice: 420, volatility: 0.015 },
      { symbol: 'GOOGL', name: 'Alphabet Inc', basePrice: 165, volatility: 0.018 },
      { symbol: 'EOSE', name: 'Eos Energy Enterprises', basePrice: 2.5, volatility: 0.050 },
    ];

    const mulberry32 = (a) => {
      return function() {
        var t = a += 0x6D2B79F5;
        t = Math.imul(t ^ t >>> 15, t | 1);
        t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      }
    }

    const generateHistoricalData = () => {
      const data = {};
      const today = new Date();
      ASSETS.forEach(asset => {
        let currentPrice = asset.basePrice * 0.7;
        const history = [];
        const rand = mulberry32(asset.symbol.charCodeAt(0) + asset.symbol.charCodeAt(1));
        for (let i = 250; i >= 0; i--) {
          const date = new Date(today);
          date.setDate(date.getDate() - i);
          const change = (rand() - 0.48) * asset.volatility * currentPrice;
          const open = currentPrice;
          const close = currentPrice + change;
          const high = Math.max(open, close) + (rand() * asset.volatility * currentPrice * 0.5);
          const low = Math.min(open, close) - (rand() * asset.volatility * currentPrice * 0.5);
          history.push({ date: date.toISOString().split('T')[0], open, high, low, close });
          currentPrice = close;
        }
        data[asset.symbol] = history;
      });
      return data;
    };
    const historicalData = generateHistoricalData();

    const calculateEMA = (data, period) => {
      const k = 2 / (period + 1);
      const emaData = [];
      let ema = data[0].close;
      for (let i = 0; i < data.length; i++) {
        if (i > 0) ema = (data[i].close * k) + (ema * (1 - k));
        emaData.push(ema);
      }
      return emaData;
    };
    const calculateSupportResistance = (data) => {
      const recentData = data.slice(-30);
      let support = recentData[0].low;
      let resistance = recentData[0].high;
      recentData.forEach(candle => {
        if (candle.low < support) support = candle.low;
        if (candle.high > resistance) resistance = candle.high;
      });
      return { support, resistance };
    };

    // ==========================================
    // MAIN APP COMPONENT
    // ==========================================
    function App() {
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [error, setError] = useState(null);
      
      const [activeTab, setActiveTab] = useState('settings');
      const [selectedAsset, setSelectedAsset] = useState(ASSETS[7]); // NVDA default
      
      const [livePrices, setLivePrices] = useState({});
      const [transactions, setTransactions] = useState([]);
      
      const [searchQuery, setSearchQuery] = useState('');
      const [showSearch, setShowSearch] = useState(false);

      const [isModalOpen, setIsModalOpen] = useState(false);
      const [modalType, setModalType] = useState('BUY'); 
      const [tradeForm, setTradeForm] = useState({ symbol: ASSETS[7].symbol, shares: '', price: '' });

      const [finnhubApiKey, setFinnhubApiKey] = useState('');
      const [savedApiKey, setSavedApiKey] = useState('');
      const [apiStatus, setApiStatus] = useState('MOCK');
      const [lastUpdate, setLastUpdate] = useState(null);
      const [isFetchingInitial, setIsFetchingInitial] = useState(false);

      // 1. Firebase Auth (หรือข้ามถ้าไม่ตั้งค่า)
      useEffect(() => {
        if (!auth) {
          setAuthLoading(false); 
          return;
        }
        auth.signInAnonymously().catch(err => {
          console.error("Auth Error:", err);
          setError("เข้าสู่ระบบ Firebase ล้มเหลว (หากใช้งานครั้งแรก กรุณาเช็คตั้งค่า Firebase)");
        });
        const unsubscribe = auth.onAuthStateChanged((u) => { 
          setUser(u); 
          setAuthLoading(false); 
        });
        return () => unsubscribe();
      }, []);

      // 2. Fetch Portfolio
      useEffect(() => {
        if (!user || !db) return;
        const txRef = db.collection('artifacts').doc('default-app-id').collection('users').doc(user.uid).collection('transactions');
        const unsubscribe = txRef.onSnapshot((snapshot) => {
          const txs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          txs.sort((a, b) => a.timestamp - b.timestamp);
          setTransactions(txs);
        }, (err) => { setError("โหลดข้อมูลพอร์ตไม่ได้ (Firebase ขัดข้อง)"); });
        return () => unsubscribe();
      }, [user]);

      // 3. API & REST Polling Logic
      useEffect(() => {
        let interval;
        const initialPrices = {};
        ASSETS.forEach(a => initialPrices[a.symbol] = historicalData[a.symbol][historicalData[a.symbol].length - 1].close);
        setLivePrices(prev => Object.keys(prev).length === 0 ? initialPrices : prev);

        if (savedApiKey) {
          setApiStatus('REAL');
          const fetchRealTimePrice = async () => {
            try {
              const response = await fetch(`https://finnhub.io/api/v1/quote?symbol=${selectedAsset.symbol}&token=${savedApiKey}`);
              const data = await response.json();
              if (data && data.c) {
                setLivePrices(prev => ({ ...prev, [selectedAsset.symbol]: data.c }));
                setLastUpdate(new Date());
              }
            } catch (err) {
              console.error("REST API Polling error", err);
            }
          };
          fetchRealTimePrice();
          interval = setInterval(fetchRealTimePrice, 5000);
        } else {
          setApiStatus('MOCK');
          interval = setInterval(() => {
            setLivePrices(prev => {
              const next = { ...prev };
              ASSETS.forEach(a => {
                const change = (Math.random() - 0.5) * a.volatility * next[a.symbol] * 0.1;
                next[a.symbol] = Math.max(0.01, next[a.symbol] + change);
              });
              return next;
            });
            setLastUpdate(new Date());
          }, 1500);
        }
        return () => { if (interval) clearInterval(interval); };
      }, [savedApiKey, selectedAsset.symbol]);

      const testApiConnection = async () => {
        if(!finnhubApiKey) { alert("กรุณาใส่ API Key ก่อนครับ"); return; }
        setIsFetchingInitial(true);
        try {
          const response = await fetch(`https://finnhub.io/api/v1/quote?symbol=NVDA&token=${finnhubApiKey}`);
          const data = await response.json();
          if(data.error) alert("API Key ไม่ถูกต้อง! (" + data.error + ")");
          else if (data.c) alert(`✅ การเชื่อมต่อสำเร็จ! ราคาล่าสุดของ NVDA คือ $${data.c} \n(สามารถกดปุ่ม "บันทึกและใช้งานจริง" ได้เลย)`);
        } catch(e) {
          alert("ไม่สามารถติดต่อ Finnhub ได้ กรุณาเช็คอินเทอร์เน็ต");
        }
        setIsFetchingInitial(false);
      };

      const fetchCurrentPricesRest = async () => {
        if(!savedApiKey) return;
        setIsFetchingInitial(true);
        try {
          const topAssets = ASSETS.slice(0, 5); 
          const fetches = topAssets.map(a => 
            fetch(`https://finnhub.io/api/v1/quote?symbol=${a.symbol}&token=${savedApiKey}`)
              .then(res => res.json())
              .then(data => ({ symbol: a.symbol, price: data.c }))
          );
          const results = await Promise.all(fetches);
          setLivePrices(prev => {
            const next = { ...prev };
            results.forEach(r => { if(r.price) next[r.symbol] = r.price; });
            return next;
          });
          setLastUpdate(new Date());
          alert("✅ โหลดราคาล่าสุดแบบ Manual สำเร็จ (อัปเดต 5 ตัวท็อป)");
        } catch(e) {
          alert("โหลดข้อมูลล้มเหลว อาจติด Rate Limit");
        }
        setIsFetchingInitial(false);
      };

      const handleTrade = async (e) => {
        e.preventDefault();
        const sharesNum = parseFloat(tradeForm.shares);
        const priceNum = parseFloat(tradeForm.price);
        if (isNaN(sharesNum) || sharesNum <= 0 || isNaN(priceNum) || priceNum <= 0) { alert("ข้อมูลไม่ถูกต้อง"); return; }

        const currentHolding = portfolio.holdings.find(h => h.symbol === tradeForm.symbol);
        if (modalType === 'SELL' && (!currentHolding || currentHolding.shares < sharesNum)) {
          alert("จำนวนหุ้นไม่พอให้ขาย"); return;
        }

        const newTx = {
            type: modalType, symbol: tradeForm.symbol, shares: sharesNum, price: priceNum,
            timestamp: Date.now(), date: new Date().toISOString()
        };

        try {
          if (db && user) {
            // โหมดบันทึกลง Firebase
            const txRef = db.collection('artifacts').doc('default-app-id').collection('users').doc(user.uid).collection('transactions');
            await txRef.add(newTx);
          } else {
            // โหมด Mock (เก็บลง Local Memory หากไม่ตั้งค่า Firebase)
            setTransactions(prev => [...prev, {id: Date.now().toString(), ...newTx}]);
            if(!db) console.log("บันทึกข้อมูลลง Memory ชั่วคราว (กรุณาตั้งค่า Firebase หากต้องการบันทึกถาวร)");
          }
          setIsModalOpen(false);
        } catch (err) { setError("ไม่สามารถทำรายการได้"); }
      };

      const openTradeModal = (type, symbol = selectedAsset.symbol) => {
        setModalType(type);
        setTradeForm({ symbol, shares: '', price: livePrices[symbol]?.toFixed(2) || '' });
        setIsModalOpen(true);
      };

      const portfolio = useMemo(() => {
        const holdings = {};
        let realizedPnL = 0;
        
        transactions.forEach(tx => {
          if (!holdings[tx.symbol]) holdings[tx.symbol] = { shares: 0, totalCost: 0, avgCost: 0 };
          if (tx.type === 'BUY') {
            holdings[tx.symbol].shares += tx.shares;
            holdings[tx.symbol].totalCost += (tx.shares * tx.price);
            holdings[tx.symbol].avgCost = holdings[tx.symbol].totalCost / holdings[tx.symbol].shares;
          } else if (tx.type === 'SELL') {
            if (holdings[tx.symbol].shares >= tx.shares) {
              const costOfSharesSold = tx.shares * holdings[tx.symbol].avgCost;
              holdings[tx.symbol].shares -= tx.shares;
              holdings[tx.symbol].totalCost -= costOfSharesSold;
              realizedPnL += ((tx.shares * tx.price) - costOfSharesSold);
            }
          }
        });

        let totalValue = 0, totalInvested = 0;
        const activeHoldings = [];

        Object.keys(holdings).forEach(symbol => {
          const h = holdings[symbol];
          if (h.shares > 0) {
            const currentPrice = livePrices[symbol] || 0;
            const currentValue = h.shares * currentPrice;
            const unrealizedPnL = currentValue - h.totalCost;
            totalValue += currentValue;
            totalInvested += h.totalCost;
            activeHoldings.push({ ...h, symbol, currentPrice, currentValue, unrealizedPnL, unrealizedPnLPercent: (h.totalCost > 0) ? (unrealizedPnL / h.totalCost) * 100 : 0 });
          }
        });

        return {
          holdings: activeHoldings, totalValue, totalInvested, realizedPnL,
          totalUnrealizedPnL: totalValue - totalInvested,
          totalPnLPercent: totalInvested > 0 ? ((totalValue - totalInvested) / totalInvested) * 100 : 0
        };
      }, [transactions, livePrices]);

      if (authLoading && db) return <div className="min-h-screen flex items-center justify-center">กำลังโหลดระบบ...</div>;

      const filteredAssets = ASSETS.filter(a => a.symbol.toLowerCase().includes(searchQuery.toLowerCase()) || a.name.toLowerCase().includes(searchQuery.toLowerCase()));

      return (
        <div className="min-h-screen flex overflow-hidden w-full">
          
          {/* SIDEBAR */}
          <div className="w-16 md:w-64 border-r border-[#2a2e39] bg-[#1e222d] flex flex-col justify-between shrink-0">
            <div>
              <div className="h-16 flex items-center justify-center md:justify-start md:px-6 border-b border-[#2a2e39]">
                <Activity className="w-8 h-8 text-blue-500" />
                <span className="ml-3 font-bold text-lg hidden md:block text-white">TraderPro</span>
              </div>
              <nav className="mt-6 flex flex-col gap-2 px-2">
                <NavItem icon={<LayoutDashboard />} label="แดชบอร์ด" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                <NavItem icon={<Briefcase />} label="พอร์ตโฟลิโอ" active={activeTab === 'portfolio'} onClick={() => setActiveTab('portfolio')} />
                <NavItem icon={<SettingsIcon />} label="ตั้งค่า API" active={activeTab === 'settings'} onClick={() => setActiveTab('settings')} />
              </nav>
            </div>
            {!db && (
              <div className="p-4 m-2 bg-red-900/20 border border-red-900/50 rounded-lg hidden md:block">
                <p className="text-xs text-red-400">ยังไม่เชื่อมต่อ Firebase (ข้อมูลจะหายเมื่อรีเฟรช)</p>
              </div>
            )}
          </div>

          {/* MAIN CONTENT */}
          <div className="flex-1 flex flex-col h-screen overflow-hidden">
            
            {/* TOP BAR */}
            <header className="h-16 border-b border-[#2a2e39] bg-[#1e222d] flex items-center justify-between px-6 shrink-0 z-20">
              <div className="relative">
                <div className="flex items-center bg-[#2a2e39] rounded-md px-3 py-1.5 w-64">
                  <SearchIcon className="w-4 h-4 text-gray-400" />
                  <input 
                    type="text" placeholder="ค้นหาสัญลักษณ์หุ้น..." value={searchQuery}
                    onChange={(e) => { setSearchQuery(e.target.value); setShowSearch(true); }}
                    onFocus={() => setShowSearch(true)} onBlur={() => setTimeout(() => setShowSearch(false), 200)}
                    className="bg-transparent border-none outline-none text-sm ml-2 w-full text-white placeholder-gray-500"
                  />
                </div>
                {showSearch && searchQuery && (
                  <div className="absolute top-full mt-1 w-full bg-[#2a2e39] border border-[#3b404d] rounded-md shadow-lg z-50 max-h-60 overflow-y-auto">
                    {filteredAssets.map(asset => (
                      <div key={asset.symbol} className="p-2 hover:bg-[#3b404d] cursor-pointer text-sm text-white flex justify-between items-center" onMouseDown={() => { setSelectedAsset(asset); setSearchQuery(''); setShowSearch(false); }}>
                        <span className="font-bold">{asset.symbol}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
              <div className="flex items-center gap-4">
                {error && <div className="text-red-500 text-sm flex items-center gap-1"><AlertCircle className="w-4 h-4"/> {error}</div>}
                
                {/* API STATUS INDICATOR */}
                <div className="flex flex-col items-end cursor-pointer" onClick={() => setActiveTab('settings')}>
                  <div className="flex items-center gap-2 px-3 py-1 bg-[#2a2e39] rounded-full hover:bg-[#3b404d]">
                    <span className={`w-2.5 h-2.5 rounded-full ${apiStatus === 'REAL' ? 'bg-green-500' : apiStatus === 'ERROR' ? 'bg-red-500' : apiStatus === 'CONNECTING' ? 'bg-yellow-500 animate-pulse' : 'bg-gray-500'}`}></span>
                    <span className="text-xs text-gray-300 font-semibold">
                      {apiStatus === 'REAL' ? 'REST API (อัปเดตทุก 5 วิ)' : apiStatus === 'CONNECTING' ? 'กำลังเชื่อมต่อ...' : apiStatus === 'ERROR' ? 'เชื่อมต่อผิดพลาด' : 'ระบบจำลอง (Mock)'}
                    </span>
                  </div>
                  <span className="text-[10px] text-gray-500 mt-1">
                    {lastUpdate ? `อัปเดต: ${lastUpdate.toLocaleTimeString()}` : 'ยังไม่มีการขยับ'}
                  </span>
                </div>

                <div className="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-sm text-white font-bold">
                  {user?.uid?.substring(0,2).toUpperCase() || 'U'}
                </div>
              </div>
            </header>

            {/* SCROLLABLE AREA */}
            <main className="flex-1 overflow-y-auto p-6 scrollbar-hide relative">
              
              {/* TAB: SETTINGS */}
              {activeTab === 'settings' && (
                <div className="max-w-2xl mx-auto space-y-6 mt-10">
                   <div className="text-center mb-8">
                     <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-600/20 text-blue-500 mb-4"><KeyIcon className="w-8 h-8" /></div>
                     <h2 className="text-2xl font-bold text-white">ตั้งค่าการเชื่อมต่อ API</h2>
                     <p className="text-gray-400 mt-2">ดึงราคาหุ้นจากตลาดจริงผ่านบริการของ Finnhub</p>
                   </div>

                   <div className="bg-[#1e222d] border border-[#2a2e39] rounded-xl p-6">
                     <form onSubmit={(e) => { e.preventDefault(); setSavedApiKey(finnhubApiKey); setActiveTab('dashboard'); }} className="space-y-4">
                       <div>
                         <label className="block text-sm text-gray-300 font-semibold mb-2">Finnhub API Key</label>
                         <input 
                           type="text" value={finnhubApiKey} onChange={(e) => setFinnhubApiKey(e.target.value)}
                           placeholder="วาง API Key จาก Finnhub ที่นี่..."
                           className="w-full bg-[#2a2e39] border border-[#3b404d] rounded-lg p-3 text-white outline-none focus:border-blue-500 font-mono text-sm"
                         />
                       </div>
                       
                       <div className="flex flex-col sm:flex-row gap-4 pt-4 border-t border-[#2a2e39]">
                         <button type="button" onClick={testApiConnection} disabled={isFetchingInitial} className="px-4 py-2 bg-[#2a2e39] hover:bg-[#3b404d] text-white font-bold rounded-lg border border-gray-600">
                           {isFetchingInitial ? 'กำลังทดสอบ...' : '1. ทดสอบ API (Test)'}
                         </button>
                         <button type="submit" className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg">
                           2. บันทึกและใช้งานจริง
                         </button>
                         <button type="button" onClick={() => { setFinnhubApiKey(''); setSavedApiKey(''); }} className="px-4 py-2 bg-red-900/30 text-red-400 hover:bg-red-900/50 font-bold rounded-lg">
                           ปิด API (ใช้ Mock)
                         </button>
                       </div>
                     </form>
                   </div>
                </div>
              )}

              {activeTab !== 'settings' && (
                <>
                  {apiStatus === 'REAL' && (
                    <div className="flex justify-end mb-4">
                       <button onClick={fetchCurrentPricesRest} disabled={isFetchingInitial} className="flex items-center gap-2 text-xs bg-blue-600/20 text-blue-400 hover:bg-blue-600/40 px-3 py-1.5 rounded-full transition">
                         <RefreshCw className={`w-3 h-3 ${isFetchingInitial ? 'animate-spin' : ''}`} />
                         {isFetchingInitial ? 'กำลังดึงข้อมูล...' : 'อัปเดตหุ้น 5 ตัวท็อปทันที'}
                       </button>
                    </div>
                  )}

                  {/* TICKER TAPE */}
                  <div className="flex gap-4 mb-6 overflow-x-auto pb-2 scrollbar-hide">
                    {ASSETS.slice(0, 7).map(asset => {
                      const price = livePrices[asset.symbol] || asset.basePrice;
                      const prevPrice = historicalData[asset.symbol][historicalData[asset.symbol].length - 1].close;
                      const change = price - prevPrice;
                      const percent = (change / prevPrice) * 100;
                      const isUp = change >= 0;

                      return (
                        <div 
                          key={asset.symbol} onClick={() => setSelectedAsset(asset)}
                          className={`min-w-[160px] p-3 rounded-lg cursor-pointer border ${selectedAsset.symbol === asset.symbol ? 'border-blue-500 bg-[#2a2e39]' : 'border-[#2a2e39] bg-[#1e222d] hover:border-gray-500'}`}
                        >
                          <div className="flex justify-between items-center mb-1">
                            <span className="font-bold text-white text-sm">{asset.symbol}</span>
                            {isUp ? <ArrowUpRight className="w-3 h-3 text-green-500" /> : <ArrowDownRight className="w-3 h-3 text-red-500" />}
                          </div>
                          <div className="text-lg font-mono text-white">${price.toFixed(2)}</div>
                          <div className={`text-xs ${isUp ? 'text-green-500' : 'text-red-500'}`}>
                            {isUp ? '+' : ''}{change.toFixed(2)} ({percent.toFixed(2)}%)
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </>
              )}

              {activeTab === 'dashboard' && (
                <div className="space-y-6">
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <SummaryCard title="มูลค่าพอร์ตโฟลิโอรวม" value={`$${portfolio.totalValue.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits:2})}`} icon={<DollarSign className="w-6 h-6 text-blue-500" />} />
                    <SummaryCard title="กำไร/ขาดทุน (Unrealized)" value={`$${portfolio.totalUnrealizedPnL.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits:2})}`} subtitle={`${portfolio.totalPnLPercent >= 0 ? '+' : ''}${portfolio.totalPnLPercent.toFixed(2)}%`} isPositive={portfolio.totalUnrealizedPnL >= 0} icon={<TrendingUp className={`w-6 h-6 ${portfolio.totalUnrealizedPnL >= 0 ? 'text-green-500' : 'text-red-500'}`} />} />
                    <SummaryCard title="เงินลงทุนทั้งหมด" value={`$${portfolio.totalInvested.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits:2})}`} icon={<Briefcase className="w-6 h-6 text-purple-500" />} />
                  </div>

                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div className="lg:col-span-2 bg-[#1e222d] border border-[#2a2e39] rounded-lg p-4 flex flex-col">
                      <div className="flex justify-between items-center mb-4">
                        <div>
                          <h2 className="text-xl font-bold text-white flex items-center gap-2">{selectedAsset.symbol}</h2>
                        </div>
                        <div className="flex gap-2">
                          <button onClick={() => openTradeModal('BUY')} className="px-4 py-1.5 bg-green-600 hover:bg-green-700 text-white text-sm font-semibold rounded">ซื้อ</button>
                          <button onClick={() => openTradeModal('SELL')} className="px-4 py-1.5 bg-red-600 hover:bg-red-700 text-white text-sm font-semibold rounded">ขาย</button>
                        </div>
                      </div>
                      <div className="flex-1 min-h-[400px] w-full relative">
                         <TechnicalChart data={historicalData[selectedAsset.symbol]} currentPrice={livePrices[selectedAsset.symbol]} />
                      </div>
                    </div>

                    <div className="bg-[#1e222d] border border-[#2a2e39] rounded-lg p-4">
                      <h3 className="font-bold text-white mb-4">หุ้นที่ถือครอง</h3>
                      {portfolio.holdings.length === 0 ? ( <div className="text-gray-500 text-center py-10">ยังไม่มีหุ้นในพอร์ต</div> ) : (
                        <div className="space-y-4 max-h-[400px] overflow-y-auto pr-2 scrollbar-hide">
                          {portfolio.holdings.map(h => (
                            <div key={h.symbol} className="flex justify-between items-center p-3 bg-[#2a2e39] rounded-lg cursor-pointer" onClick={() => setSelectedAsset(ASSETS.find(a => a.symbol === h.symbol))}>
                              <div>
                                <div className="font-bold text-white">{h.symbol}</div>
                                <div className="text-xs text-gray-400">{h.shares} หุ้น</div>
                              </div>
                              <div className="text-right">
                                <div className="font-mono text-white">${h.currentValue.toFixed(2)}</div>
                                <div className={`text-xs ${h.unrealizedPnL >= 0 ? 'text-green-500' : 'text-red-500'}`}>
                                  {h.unrealizedPnL >= 0 ? '+' : ''}{h.unrealizedPnL.toFixed(2)}
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              )}

              {activeTab === 'portfolio' && (
                <div className="space-y-6">
                  <div className="flex justify-between items-center">
                    <h2 className="text-2xl font-bold text-white">จัดการพอร์ตโฟลิโอ</h2>
                    <button onClick={() => openTradeModal('BUY')} className="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors">
                      <PlusIcon className="w-4 h-4" /> เพิ่มรายการ
                    </button>
                  </div>
                  <div className="bg-[#1e222d] border border-[#2a2e39] rounded-lg overflow-x-auto">
                    <table className="w-full text-left border-collapse min-w-[800px]">
                      <thead>
                        <tr className="bg-[#2a2e39] text-gray-400 text-xs uppercase tracking-wider">
                          <th className="p-4 font-semibold">ชื่อหุ้น</th>
                          <th className="p-4 font-semibold text-right">จำนวนหุ้น</th>
                          <th className="p-4 font-semibold text-right">ต้นทุนเฉลี่ย</th>
                          <th className="p-4 font-semibold text-right">ราคาปัจจุบัน</th>
                          <th className="p-4 font-semibold text-right">มูลค่าตลาด</th>
                          <th className="p-4 font-semibold text-right">กำไร/ขาดทุน</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-[#2a2e39]">
                        {portfolio.holdings.map(h => (
                          <tr key={h.symbol} className="hover:bg-[#252933]">
                            <td className="p-4 font-bold text-white flex items-center gap-2 cursor-pointer" onClick={() => {setSelectedAsset(ASSETS.find(a=>a.symbol === h.symbol)); setActiveTab('dashboard');}}>
                              <div className={`w-2 h-2 rounded-full ${h.unrealizedPnL >= 0 ? 'bg-green-500' : 'bg-red-500'}`}></div>
                              {h.symbol}
                            </td>
                            <td className="p-4 text-right font-mono">{h.shares}</td>
                            <td className="p-4 text-right font-mono">${h.avgCost.toFixed(2)}</td>
                            <td className="p-4 text-right font-mono">${h.currentPrice.toFixed(2)}</td>
                            <td className="p-4 text-right font-mono text-white">${h.currentValue.toFixed(2)}</td>
                            <td className={`p-4 text-right font-mono ${h.unrealizedPnL >= 0 ? 'text-green-500' : 'text-red-500'}`}>
                              {h.unrealizedPnL >= 0 ? '+' : ''}{h.unrealizedPnL.toFixed(2)} ({h.unrealizedPnLPercent.toFixed(2)}%)
                            </td>
                          </tr>
                        ))}
                        {portfolio.holdings.length === 0 && (
                          <tr><td colSpan="6" className="p-8 text-center text-gray-500">ไม่มีหุ้นในพอร์ตโฟลิโอของคุณ</td></tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

            </main>
          </div>

          {/* TRADE MODAL */}
          {isModalOpen && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-[#1e222d] border border-[#2a2e39] rounded-xl w-full max-w-md overflow-hidden shadow-2xl">
                <div className={`p-4 border-b border-[#2a2e39] ${modalType === 'BUY' ? 'bg-blue-900/20' : 'bg-red-900/20'}`}>
                  <h2 className="text-xl font-bold text-white">คำสั่ง{modalType === 'BUY' ? 'ซื้อ' : 'ขาย'}</h2>
                </div>
                <form onSubmit={handleTrade} className="p-6 space-y-4">
                  <div>
                    <label className="block text-xs text-gray-400 uppercase font-semibold mb-1">ชื่อหุ้น (Symbol)</label>
                    <select value={tradeForm.symbol} onChange={(e) => setTradeForm({...tradeForm, symbol: e.target.value, price: livePrices[e.target.value]?.toFixed(2)})} className="w-full bg-[#2a2e39] border border-[#3b404d] rounded-lg p-2.5 text-white outline-none">
                      {ASSETS.map(a => <option key={a.symbol} value={a.symbol}>{a.symbol}</option>)}
                    </select>
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs text-gray-400 uppercase font-semibold mb-1">จำนวนหุ้น</label>
                      <input type="number" step="0.01" required min="0.01" value={tradeForm.shares} onChange={(e) => setTradeForm({...tradeForm, shares: e.target.value})} className="w-full bg-[#2a2e39] border border-[#3b404d] rounded-lg p-2.5 text-white outline-none font-mono" placeholder="0.00" />
                    </div>
                    <div>
                      <label className="block text-xs text-gray-400 uppercase font-semibold mb-1">ราคา (USD)</label>
                      <input type="number" step="0.01" required value={tradeForm.price} onChange={(e) => setTradeForm({...tradeForm, price: e.target.value})} className="w-full bg-[#2a2e39] border border-[#3b404d] rounded-lg p-2.5 text-white outline-none font-mono" />
                    </div>
                  </div>
                  <div className="flex gap-3 pt-4 border-t border-[#2a2e39]">
                    <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 py-2.5 rounded-lg border border-[#3b404d] text-gray-300">ยกเลิก</button>
                    <button type="submit" className={`flex-1 py-2.5 rounded-lg text-white font-bold ${modalType === 'BUY' ? 'bg-blue-600' : 'bg-red-600'}`}>ยืนยัน</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // SUB-COMPONENTS
    // ==========================================
    function NavItem({ icon, label, active, onClick }) {
      return (
        <button onClick={onClick} className={`w-full flex items-center justify-center md:justify-start p-3 rounded-lg transition-colors ${active ? 'bg-blue-600/10 text-blue-500' : 'text-gray-400 hover:bg-[#2a2e39]'}`}>
          {React.cloneElement(icon, { className: `w-5 h-5 ${active ? 'text-blue-500' : 'text-gray-400'}` })}
          <span className="ml-3 font-medium hidden md:block whitespace-nowrap">{label}</span>
        </button>
      );
    }

    function SummaryCard({ title, value, subtitle, icon, isPositive }) {
      return (
        <div className="bg-[#1e222d] border border-[#2a2e39] rounded-lg p-5 flex items-center">
          <div className="w-12 h-12 rounded-full bg-[#2a2e39] flex items-center justify-center shrink-0">{icon}</div>
          <div className="ml-4">
            <h3 className="text-sm font-semibold text-gray-400">{title}</h3>
            <div className="text-2xl font-bold text-white mt-1 font-mono">{value}</div>
            {subtitle && <div className={`text-xs mt-1 font-medium ${isPositive ? 'text-green-500' : 'text-red-500'}`}>{subtitle}</div>}
          </div>
        </div>
      );
    }

    function TechnicalChart({ data, currentPrice }) {
      const containerRef = useRef(null);
      const [dim, setDim] = useState({ width: 800, height: 400 });
      useEffect(() => {
        if (containerRef.current) setDim({ width: containerRef.current.clientWidth, height: containerRef.current.clientHeight });
        const handleResize = () => { if (containerRef.current) setDim({ width: containerRef.current.clientWidth, height: containerRef.current.clientHeight }); };
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);
      const { width, height } = dim;
      const padding = { top: 20, bottom: 30, left: 10, right: 60 };
      const drawWidth = width - padding.left - padding.right;
      const drawHeight = height - padding.top - padding.bottom;

      const displayData = [...data];
      if (currentPrice) {
        const last = { ...displayData[displayData.length - 1] };
        last.close = currentPrice;
        last.high = Math.max(last.high, currentPrice);
        last.low = Math.min(last.low, currentPrice);
        displayData[displayData.length - 1] = last;
      }
      const viewData = displayData.slice(-100);
      const ema125 = calculateEMA(displayData, 125).slice(-100);
      const ema200 = calculateEMA(displayData, 200).slice(-100);
      const { support, resistance } = calculateSupportResistance(displayData);

      const minPrice = Math.min(...viewData.map(d => d.low), ...ema200.filter(v=>!isNaN(v)));
      const maxPrice = Math.max(...viewData.map(d => d.high), ...ema200.filter(v=>!isNaN(v)));
      const priceRange = maxPrice - minPrice;

      const getX = (index) => padding.left + (index * (drawWidth / (viewData.length - 1)));
      const getY = (price) => padding.top + drawHeight - (((price - minPrice) / priceRange) * drawHeight);

      const createLinePath = (arr) => arr.map((val, i) => isNaN(val) ? '' : `${i === 0 ? 'M' : 'L'} ${getX(i)} ${getY(val)}`).join(' ');
      const candleWidth = Math.max(2, (drawWidth / viewData.length) * 0.7);

      const yLabels = [];
      for (let i = 0; i <= 5; i++) yLabels.push(minPrice + (priceRange * (i / 5)));

      return (
        <div ref={containerRef} className="absolute inset-0 cursor-crosshair">
          <svg width={width} height={height} className="block">
            {yLabels.map((lbl, i) => (
              <g key={i}>
                <line x1={padding.left} y1={getY(lbl)} x2={width - padding.right} y2={getY(lbl)} stroke="#2a2e39" strokeWidth="1" strokeDasharray="4,4" />
                <text x={width - padding.right + 5} y={getY(lbl) + 4} fill="#888" fontSize="11" fontFamily="monospace">{lbl.toFixed(2)}</text>
              </g>
            ))}
            <line x1={padding.left} y1={getY(support)} x2={width - padding.right} y2={getY(support)} stroke="rgba(34, 197, 94, 0.5)" strokeWidth="2" strokeDasharray="5,5" />
            <line x1={padding.left} y1={getY(resistance)} x2={width - padding.right} y2={getY(resistance)} stroke="rgba(239, 68, 68, 0.5)" strokeWidth="2" strokeDasharray="5,5" />
            <path d={createLinePath(ema125)} fill="none" stroke="#3b82f6" strokeWidth="2" />
            <path d={createLinePath(ema200)} fill="none" stroke="#f97316" strokeWidth="2" />
            {viewData.map((d, i) => {
              const x = getX(i); const color = d.close >= d.open ? '#22c55e' : '#ef4444';
              const yTop = getY(Math.max(d.open, d.close)); const rectHeight = Math.max(1, getY(Math.min(d.open, d.close)) - yTop);
              return (
                <g key={i}>
                  <line x1={x} y1={getY(d.high)} x2={x} y2={getY(d.low)} stroke={color} strokeWidth="1" />
                  <rect x={x - candleWidth/2} y={yTop} width={candleWidth} height={rectHeight} fill={color} />
                </g>
              );
            })}
            {currentPrice && (
              <g>
                <line x1={padding.left} y1={getY(currentPrice)} x2={width - padding.right} y2={getY(currentPrice)} stroke="#3b82f6" strokeWidth="1" strokeDasharray="2,2" />
                <rect x={width - padding.right} y={getY(currentPrice) - 10} width={60} height={20} fill="#3b82f6" />
                <text x={width - padding.right + 5} y={getY(currentPrice) + 4} fill="#fff" fontSize="11" fontFamily="monospace" fontWeight="bold">{currentPrice.toFixed(2)}</text>
              </g>
            )}
          </svg>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
