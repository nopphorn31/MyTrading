            aiAnalysis: 'บทวิเคราะห์สรุปโดย AI', aiBullish: 'จากข้อมูลทางเทคนิค {symbol} อยู่ในแนวโน้ม ขาขึ้น (BULLISH) เมื่อประกอบกับกระแสข่าวสารล่าสุด บ่งชี้ถึงโมเมนตัมเชิงบวก แนะนำให้ถือครองหรือหาจังหวะย่อซื้อที่แนวรับ', aiBearish: 'จากข้อมูลทางเทคนิค {symbol} อยู่ในแนวโน้ม ขาลง (BEARISH) บรรยากาศตลาดมีความระมัดระวัง แนะนำให้บริหารจัดการความเสี่ยงอย่างรัดกุม และจับตาดูแนวต้านสำคัญ', loadingChart: 'กำลังประมวลผลข้อมูลตลาดและรวบรวมข่าวสาร...',
            recentNews: 'ข่าวสารล่าสุดจากตลาดหลักทรัพย์', noNews: 'ไม่มีข่าวสารอัปเดตในขณะนี้',
            transLogs: 'ประวัติการทำรายการ', date: 'วัน-เวลา', type: 'ประเภท', totalVal: 'มูลค่ารวม', emptyTrans: 'ยังไม่มีประวัติการทำรายการ',
            compPort: 'ภาพรวมพอร์ตโฟลิโอแบบละเอียด', capInvested: 'เงินทุนทั้งหมด', currEquity: 'มูลค่าพอร์ตปัจจุบัน', unRealized: 'กำไร/ขาดทุน ที่ยังไม่รับรู้', invested: 'เงินทุน',
          }

        // --- Technical Analysis Helpers ---
        const calculateEMA = (data, period, key = 'close') => {
          if (!data || data.length === 0) return [];
          const k = 2 / (period + 1);
          let emaData = [];
          let ema = data[0][key]; 
          for (let i = 0; i < data.length; i++) {
            if (i > 0) ema = (data[i][key] * k) + (ema * (1 - k));
            emaData.push(ema);
          }
          return emaData;
        };

        const getTodayString = () => new Date().toISOString().split('T')[0];

        // --- Main Application Component ---
        function App() {
          const [lang, setLang] = useState('th'); 
          const t = useCallback((key, params = {}) => {
            let str = TRANSLATIONS[lang][key] || key;
            Object.keys(params).forEach(k => { str = str.replace(`{${k}}`, params[k]); });
            return str;
          }, [lang]);

          const [user, setUser] = useState(null);
          const [activeTab, setActiveTab] = useState('dashboard');
          const [loading, setLoading] = useState(true);
          
          // Auth Form State
          const [authForm, setAuthForm] = useState({ email: '', password: '', isLogin: true });
          const [rememberMe, setRememberMe] = useState(false);
          
          // Market Data States
          const [watchedStocks, setWatchedStocks] = useState(['AAPL', 'TSLA', 'NVDA', 'MSFT', 'META']);
          const [prices, setPrices] = useState({ AAPL: 175.50, TSLA: 210.25, NVDA: 850.00, MSFT: 420.30, META: 505.20 });
          const [wsStatus, setWsStatus] = useState('connecting');
          const socketRef = useRef(null);

          // Search States
          const [searchQuery, setSearchQuery] = useState('');
          const [searchResults, setSearchResults] = useState([]);
          const [analysisSearchQuery, setAnalysisSearchQuery] = useState('');
          const [analysisSearchResults, setAnalysisSearchResults] = useState([]);

          // Portfolio & DB States
          const [portfolio, setPortfolio] = useState({});
          const [transactions, setTransactions] = useState([]);
          const [dbError, setDbError] = useState('');

          // UI Forms & Feedbacks
          const [tradeForm, setTradeForm] = useState({ symbol: 'AAPL', type: 'BUY', shares: '', price: '', date: getTodayString() });
          const [tradeError, setTradeError] = useState('');
          
          // Dedicated Sell Form for Portfolio Page
          const [portSellForm, setPortSellForm] = useState({ symbol: '', shares: '', price: '', date: getTodayString() });
          const [portSellError, setPortSellError] = useState('');

          const [authError, setAuthError] = useState('');

          // Analysis States
          const [selectedAnalysis, setSelectedAnalysis] = useState('NVDA');
          const [chartData, setChartData] = useState([]); 
          const [stockNews, setStockNews] = useState([]);
          const [isLoadingChart, setIsLoadingChart] = useState(false);

          // 1. Authentication Listener & Remember Me Initializer
          useEffect(() => {
            const savedEmail = localStorage.getItem('ptx_email');
            const savedPwd = localStorage.getItem('ptx_pwd');
            if (savedEmail && savedPwd) {
              setAuthForm(p => ({ ...p, email: savedEmail, password: savedPwd }));
              setRememberMe(true);
            }

            const unsubscribe = onAuthStateChanged(auth, (u) => {
              setUser(u);
              setLoading(false);
            });
            return () => unsubscribe();
          }, []);

          // 2. Real-time Market Data (WebSocket Management + Polling Fallback)
          useEffect(() => {
            let pollingInterval;
            let isWsConnected = false;

            const fetchQuotesRestAPI = async () => {
              const newPrices = {};
              let updated = false;
              for (const sym of watchedStocks) {
                try {
                  const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${FINNHUB_TOKEN}`);
                  const data = await res.json();
                  if (data && data.c) { newPrices[sym] = data.c; updated = true; }
                } catch(e) {}
              }
              if (updated) setPrices(prev => ({...prev, ...newPrices}));
            };

            const startPolling = () => {
              if (pollingInterval) return;
              setWsStatus('polling');
              fetchQuotesRestAPI();
              pollingInterval = setInterval(fetchQuotesRestAPI, 10000);
            };

            const connectWS = () => {
              try {
                if(socketRef.current) socketRef.current.close();
                const socket = new WebSocket(`wss://ws.finnhub.io?token=${FINNHUB_TOKEN}`);
                socketRef.current = socket;
                
                socket.addEventListener('open', () => {
                  isWsConnected = true;
                  setWsStatus('live');
                  if (pollingInterval) { clearInterval(pollingInterval); pollingInterval = null; }
                  watchedStocks.forEach(symbol => socket.send(JSON.stringify({'type':'subscribe', 'symbol': symbol})));
                });

                socket.addEventListener('message', (event) => {
                  try {
                    const message = JSON.parse(event.data);
                    if (message.type === 'trade') {
                      setPrices(prev => {
                        const newPrices = { ...prev };
                        let updated = false;
                        message.data.forEach(trade => {
                          if (watchedStocks.includes(trade.s) || trade.s === selectedAnalysis) {
                            newPrices[trade.s] = trade.p; updated = true;
                          }
                        });
                        return updated ? newPrices : prev;
                      });
                    }
                  } catch (e) {}
                });
                
                socket.addEventListener('error', () => { if (!isWsConnected) startPolling(); });
                socket.addEventListener('close', () => startPolling());
              } catch (err) { startPolling(); }
            };

            connectWS();
            return () => {
              if (socketRef.current && socketRef.current.readyState === WebSocket.OPEN) socketRef.current.close();
              if (pollingInterval) clearInterval(pollingInterval);
            };
          }, [watchedStocks, selectedAnalysis]);

          // 3. Database Listeners (Portfolio, Transactions)
          useEffect(() => {
            if (!user || !db) return;
            setDbError('');

            const unsubPort = onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'portfolio'), 
              (snapshot) => {
                const p = {};
                snapshot.forEach(doc => { p[doc.id] = doc.data(); });
                setPortfolio(p);
                setDbError(''); 
              }, 
              (err) => { if (err.code === 'permission-denied') setDbError('Permission Denied (Firebase Rules)'); }
            );

            const unsubTrans = onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'transactions'), 
              (snapshot) => {
                const t = [];
                snapshot.forEach(doc => t.push({ id: doc.id, ...doc.data() }));
                t.sort((a, b) => b.timestamp - a.timestamp);
                setTransactions(t);
              }
            );

            return () => { unsubPort(); unsubTrans(); };
          }, [user]);

          // 4. Fetch Real Historical Data & News for AI Analysis
          useEffect(() => {
            const fetchData = async () => {
              setIsLoadingChart(true);
              try {
                const to = Math.floor(Date.now() / 1000);
                const from = to - (250 * 24 * 60 * 60);
                const resPrice = await fetch(`https://finnhub.io/api/v1/stock/candle?symbol=${selectedAnalysis}&resolution=D&from=${from}&to=${to}&token=${FINNHUB_TOKEN}`);
                const jsonPrice = await resPrice.json();
                
                if (jsonPrice.s === 'ok' && jsonPrice.c && jsonPrice.c.length > 0) {
                  const baseData = jsonPrice.t.map((timestamp, i) => ({ close: jsonPrice.c[i] }));
                  const ema125 = calculateEMA(baseData, 125);
                  const ema200 = calculateEMA(baseData, 200);
                  
                  setChartData(baseData.map((d, i) => ({
                    ema125: Number((ema125[i] || d.close).toFixed(2)),
                    ema200: Number((ema200[i] || d.close).toFixed(2))
                  })));
                  
                  if (!prices[selectedAnalysis]) setPrices(p => ({...p, [selectedAnalysis]: jsonPrice.c[jsonPrice.c.length - 1]}));
                }

                const todayStr = getTodayString();
                const lastWeek = new Date(); lastWeek.setDate(lastWeek.getDate() - 7);
                const lastWeekStr = lastWeek.toISOString().split('T')[0];
                
                const resNews = await fetch(`https://finnhub.io/api/v1/company-news?symbol=${selectedAnalysis}&from=${lastWeekStr}&to=${todayStr}&token=${FINNHUB_TOKEN}`);
                const jsonNews = await resNews.json();
                if (Array.isArray(jsonNews)) setStockNews(jsonNews.slice(0, 5));
              } catch (err) {
                console.error("Analysis data fetch failed", err);
              }
              setIsLoadingChart(false);
            };

            fetchData();
          }, [selectedAnalysis]);


          // --- Actions ---
          const handleAuth = async (e) => {
            e.preventDefault();
            setLoading(true); setAuthError('');
            try {
              if (authForm.isLogin) {
                await signInWithEmailAndPassword(auth, authForm.email, authForm.password);
              } else {
                await createUserWithEmailAndPassword(auth, authForm.email, authForm.password);
              }
              
              if (rememberMe) {
                localStorage.setItem('ptx_email', authForm.email);
                localStorage.setItem('ptx_pwd', authForm.password);
              } else {
                localStorage.removeItem('ptx_email');
                localStorage.removeItem('ptx_pwd');
              }
            } catch (error) { setAuthError(error.message); }
            setLoading(false);
          };

          const handleSearch = async (e) => {
            e.preventDefault();
            if(!searchQuery.trim()) return;
            try {
              const res = await fetch(`https://finnhub.io/api/v1/search?q=${searchQuery}&token=${FINNHUB_TOKEN}`);
              const data = await res.json();
              if(data.result) setSearchResults(data.result.filter(r => r.type === 'Common Stock' && !r.symbol.includes('.')).slice(0, 5));
            } catch (err) { console.error(err); }
          };

          const handleAnalysisSearch = async (e) => {
            e.preventDefault();
            if(!analysisSearchQuery.trim()) return;
            try {
              const res = await fetch(`https://finnhub.io/api/v1/search?q=${analysisSearchQuery}&token=${FINNHUB_TOKEN}`);
              const data = await res.json();
              if(data.result) setAnalysisSearchResults(data.result.filter(r => r.type === 'Common Stock' && !r.symbol.includes('.')).slice(0, 5));
            } catch (err) { console.error(err); }
          };

          const selectAnalysisStock = (symbol) => {
            setSelectedAnalysis(symbol);
            setAnalysisSearchQuery('');
            setAnalysisSearchResults([]);
          };

          const addStockToWatchlist = (symbol) => {
            if (!watchedStocks.includes(symbol)) setWatchedStocks(prev => [symbol, ...prev].slice(0, 10));
            setTradeForm(p => ({...p, symbol}));
            setSearchQuery('');
            setSearchResults([]);
          };

          // Unified Trade Execute Logic
          const executeTradeTransaction = async (symbol, type, sharesToTrade, customPrice, customDate, setErrorCallback) => {
            if (!user || !db) return false;
            setErrorCallback('');
            
            // Use custom price if entered, otherwise fallback to live market price
            const tradePrice = customPrice ? Number(customPrice) : prices[symbol];
            
            // Calculate timestamp from selected date (set time to noon to avoid timezone shift issues)
            const dateObj = customDate ? new Date(customDate + "T12:00:00Z") : new Date();
            const tradeTimestamp = dateObj.getTime();

            if (!tradePrice || isNaN(tradePrice)) { setErrorCallback("Wait for price data or enter a valid price."); return false; }
            if (sharesToTrade <= 0 || isNaN(sharesToTrade)) { setErrorCallback("Shares must be greater than 0"); return false; }

            const portDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'portfolio', symbol);
            const transRef = doc(collection(db, 'artifacts', appId, 'users', user.uid, 'transactions'));

            try {
              await runTransaction(db, async (transaction) => {
                const portDoc = await transaction.get(portDocRef);
                let newShares = sharesToTrade;
                let newAvgCost = tradePrice;

                if (portDoc.exists()) {
                  const currentData = portDoc.data();
                  if (type === 'SELL') {
                    if (currentData.shares < sharesToTrade) throw new Error("Insufficient shares in portfolio.");
                    newShares = currentData.shares - sharesToTrade;
                    newAvgCost = currentData.avgCost; // Avg cost doesn't change on sell
                  } else {
                    const totalCost = (currentData.shares * currentData.avgCost) + (sharesToTrade * tradePrice);
                    newShares = currentData.shares + sharesToTrade;
                    newAvgCost = totalCost / newShares;
                  }
                } else if (type === 'SELL') {
                  throw new Error("You don't own any shares of this stock.");
                }

                if (newShares === 0) transaction.delete(portDocRef);
                else transaction.set(portDocRef, { symbol, shares: newShares, avgCost: newAvgCost, lastUpdated: Date.now() });

                transaction.set(transRef, { symbol, type, shares: sharesToTrade, price: tradePrice, timestamp: tradeTimestamp });
              });
              return true;
            } catch (error) {
              if (error.code === 'permission-denied') setDbError('Permission Denied (Firebase Rules)');
              else setErrorCallback(error.message);
              return false;
            }
          };

          const handleTrade = async (e) => {
            e.preventDefault();
            const success = await executeTradeTransaction(tradeForm.symbol, tradeForm.type, Number(tradeForm.shares), tradeForm.price, tradeForm.date, setTradeError);
            if (success) setTradeForm(prev => ({...prev, shares: '', price: ''}));
          };

          const handlePortSell = async (e) => {
            e.preventDefault();
            if (!portSellForm.symbol) return setPortSellError("กรุณาเลือกหุ้นที่ต้องการขาย (Please select a stock to sell)");
            const success = await executeTradeTransaction(portSellForm.symbol, 'SELL', Number(portSellForm.shares), portSellForm.price, portSellForm.date, setPortSellError);
            if (success) setPortSellForm(prev => ({...prev, symbol: '', shares: '', price: ''}));
          };

          const handleSellAll = (targetForm, setter) => {
            const owned = portfolio[targetForm.symbol]?.shares || 0;
            if (owned > 0) setter(prev => ({ ...prev, shares: owned }));
            else if(targetForm === tradeForm) setTradeError("ไม่มีหุ้นนี้ในพอร์ตเพื่อขาย");
          };

          // --- Derived Metrics ---
          const portfolioMetrics = useMemo(() => {
            let totalInvested = 0; let totalValue = 0;
            Object.values(portfolio).forEach(item => {
              const currentPrice = prices[item.symbol] || item.avgCost;
              totalInvested += (item.shares * item.avgCost);
              totalValue += (item.shares * currentPrice);
            });
            const profitLoss = totalValue - totalInvested;
            const profitLossPercent = totalInvested > 0 ? (profitLoss / totalInvested) * 100 : 0;
            return { totalInvested, totalValue, profitLoss, profitLossPercent };
          }, [portfolio, prices]);

          const trendStatus = useMemo(() => {
            if (!chartData || chartData.length < 2) return null;
            const last = chartData[chartData.length - 1];
            return last.ema125 > last.ema200 ? 'BULLISH' : 'BEARISH';

                        {/* Left Column: AI Summary & Technicals */}
                        <div className="space-y-4 md:space-y-6">
                          {/* AI Summary Box */}
                          <div className="bg-gradient-to-br from-blue-900/20 to-purple-900/20 p-5 md:p-6 rounded-2xl border border-blue-500/30 shadow-lg relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-4 opacity-10"><Activity size={80} className="md:w-[100px] md:h-[100px]" /></div>
                            <h4 className="text-base md:text-lg font-bold text-white mb-3 md:mb-4 flex items-center gap-2"><AlertCircle className="text-blue-400"/> {t('aiAnalysis')}</h4>
                            <div className="bg-[#0B0E14]/50 p-4 md:p-5 rounded-xl border border-slate-800/50">
                               <p className="text-sm md:text-base text-slate-200 leading-relaxed">
                                 {trendStatus === 'BULLISH' ? t('aiBullish', {symbol: selectedAnalysis}) : t('aiBearish', {symbol: selectedAnalysis})}
                               </p>
                            </div>
                            
                            <div className="mt-4 md:mt-6 flex flex-row items-center gap-3 md:gap-4">
                              <div className="flex-1 bg-[#0B0E14] rounded-lg p-3 md:p-4 text-center border border-slate-800">
                                 <div className="text-[10px] md:text-xs text-slate-400 mb-1">Technical Trend (EMA)</div>
                                 <div className={`text-lg md:text-xl font-black ${trendStatus === 'BULLISH' ? 'text-emerald-500' : 'text-red-500'} flex items-center justify-center gap-1 md:gap-2`}>
                                    {trendStatus === 'BULLISH' ? <TrendingUp size={20}/> : <TrendingDown size={20}/>} {trendStatus}
                                 </div>
                              </div>
                              <div className="flex-1 bg-[#0B0E14] rounded-lg p-3 md:p-4 text-center border border-slate-800">
                                 <div className="text-[10px] md:text-xs text-slate-400 mb-1">Current Price</div>
                                 <div className="text-lg md:text-xl font-black text-white font-mono">
                                    ${prices[selectedAnalysis] ? prices[selectedAnalysis].toFixed(2) : '---'}
                                 </div>
                              </div>
                            </div>
                          </div>

                          {/* Technical Indicator Raw Data */}
                          <div className="bg-[#1a2133] p-5 md:p-6 rounded-2xl border border-slate-700/50">
                            <h4 className="text-xs md:text-sm font-bold text-slate-300 mb-3 md:mb-4 uppercase tracking-wider">Indicator Readings (Daily)</h4>
                            {chartData && chartData.length > 0 ? (
                              <div className="space-y-2 md:space-y-3 font-mono text-xs md:text-sm">
                                 <div className="flex justify-between items-center pb-2 md:pb-3 border-b border-slate-700">
                                   <span className="text-slate-400">125-Day EMA (Mid-Term)</span>
                                   <span className="text-white font-bold">${chartData[chartData.length - 1].ema125}</span>
                                 </div>
                                 <div className="flex justify-between items-center pt-1">
                                   <span className="text-slate-400">200-Day EMA (Long-Term)</span>
                                   <span className="text-white font-bold">${chartData[chartData.length - 1].ema200}</span>
                                 </div>
                              </div>
                            ) : (
                              <div className="text-sm text-slate-500 italic">No indicator data available.</div>
                            )}
                          </div>
                        </div>

                        {/* Right Column: News Feed */}
                        <div className="bg-[#1a2133] rounded-2xl border border-slate-700/50 flex flex-col h-[400px] md:h-full md:max-h-[600px]">
                          <div className="p-4 md:p-5 border-b border-slate-700 flex items-center gap-2 md:gap-3">
                            <Newspaper className="text-blue-400" size={18} />
                            <h4 className="text-base md:text-lg font-bold text-white">{t('recentNews')}</h4>
                            <span className="ml-auto bg-blue-500/20 text-blue-400 text-[10px] md:text-xs px-2 py-1 rounded-full font-bold">{selectedAnalysis}</span>
                          </div>
                          <div className="p-2 overflow-y-auto flex-1">
                            {stockNews.length === 0 ? (
                              <div className="p-8 text-center text-sm text-slate-500 italic">{t('noNews')}</div>
                            ) : (
                              <div className="space-y-2">
                                {stockNews.map((news, idx) => (
                                  <a key={idx} href={news.url} target="_blank" rel="noopener noreferrer" className="block p-3 md:p-4 hover:bg-[#232d45] rounded-xl transition-colors border border-transparent hover:border-slate-600">
                                    <div className="flex justify-between items-start gap-3 md:gap-4 mb-2">
                                       <h5 className="text-xs md:text-sm font-bold text-white leading-snug line-clamp-2">{news.headline}</h5>
                                       {news.image && <img src={news.image} alt="" className="w-12 h-12 md:w-16 md:h-16 object-cover rounded-lg shrink-0 border border-slate-700" />}
                                    </div>
                                    <div className="flex items-center gap-2 md:gap-3 text-[10px] md:text-xs text-slate-500">
                                      <span className="font-semibold text-blue-400">{news.source}</span>
                                      <span>•</span>
                                      <span>{new Date(news.datetime * 1000).toLocaleDateString(lang === 'th' ? 'th-TH' : 'en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</span>
                                    </div>
                                  </a>
                                ))}
                              </div>
                            )}
                          </div>
                        </div>

                      </div>
                    )}
                  </div>
                )}

                {/* Transaction History Tab */}
                {activeTab === 'history' && (
                  <div className="bg-[#111621] p-4 md:p-6 rounded-2xl border border-slate-800">
                     <h3 className="text-lg md:text-xl font-bold text-white mb-4 md:mb-6">{t('transLogs')}</h3>
                     <div className="overflow-x-auto">
                        <table className="w-full text-sm text-left text-slate-400 whitespace-nowrap">
                          <thead className="text-xs text-slate-500 uppercase bg-[#1a2133]">
                            <tr>
                              <th className="px-4 md:px-6 py-3 md:py-4">{t('date')}</th>
                              <th className="px-4 md:px-6 py-3 md:py-4">{t('type')}</th>
                              <th className="px-4 md:px-6 py-3 md:py-4">{t('asset')}</th>
                              <th className="px-4 md:px-6 py-3 md:py-4">{t('shares')}</th>
                              <th className="px-4 md:px-6 py-3 md:py-4">Price</th>
                              <th className="px-4 md:px-6 py-3 md:py-4">{t('totalVal')}</th>
                            </tr>
                          </thead>
                          <tbody>
                            {transactions.length === 0 ? (
                              <tr><td colSpan="6" className="px-6 py-8 text-center text-slate-500">{t('emptyTrans')}</td></tr>
                            ) : (
                              transactions.map(tx => (
                                <tr key={tx.id} className="border-b border-slate-800/50 hover:bg-[#1a2133]">
                                  <td className="px-4 md:px-6 py-4 text-xs md:text-sm">{new Date(tx.timestamp).toLocaleString(lang === 'th' ? 'th-TH' : 'en-US')}</td>
                                  <td className="px-4 md:px-6 py-4">
                                    <span className={`px-2 py-1 rounded text-[10px] md:text-xs font-bold ${tx.type === 'BUY' ? 'bg-emerald-600/20 text-emerald-400' : 'bg-red-600/20 text-red-400'}`}>
                                      {tx.type}
                                    </span>
                                  </td>
                                  <td className="px-4 md:px-6 py-4 font-bold text-white text-sm md:text-base">{tx.symbol}</td>
                                  <td className="px-4 md:px-6 py-4">{tx.shares}</td>
                                  <td className="px-4 md:px-6 py-4 font-mono">${tx.price.toFixed(2)}</td>
                                  <td className="px-4 md:px-6 py-4 text-white font-mono font-bold">${(tx.shares * tx.price).toFixed(2)}</td>
                                </tr>
                              ))
                            )}
                          </tbody>
                        </table>
                      </div>
                  </div>
                )}

                {/* Extended Portfolio Tab */}
                {activeTab === 'portfolio' && (
                   <div className="bg-[#111621] p-4 md:p-6 rounded-2xl border border-slate-800">
                     
                     {/* New Dedicated Sell Menu Section */}
                     <div className="bg-[#1a2133] p-5 md:p-6 rounded-2xl border border-red-500/30 mb-8">
                       <h3 className="text-base md:text-lg font-semibold text-white mb-4 flex items-center gap-2 text-red-400">
                         {t('sellMenuTitle')}
                       </h3>
                       <form onSubmit={handlePortSell} className="space-y-4">
                          {portSellError && <div className="p-2 bg-red-500/20 text-red-400 text-xs md:text-sm rounded-lg border border-red-500/50">{portSellError}</div>}
                          
                          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 items-end">
                            
                            <div className="flex flex-col">
                              <label className="text-xs text-slate-400 mb-1">{t('selectAsset')}</label>
                              <select 
                                value={portSellForm.symbol} 
                                onChange={(e) => setPortSellForm({...portSellForm, symbol: e.target.value})}
                                className="bg-[#0B0E14] border border-slate-700 text-white text-sm rounded-lg p-2.5 outline-none font-bold"
                              >
                                <option value="" disabled>-- {t('selectAsset')} --</option>
                                {Object.keys(portfolio).map(sym => <option key={sym} value={sym}>{sym}</option>)}
                              </select>
                            </div>

                            <div className="flex flex-col">
                              <label className="text-xs text-slate-400 mb-1">{t('customPrice')}</label>
                              <input 
                                type="number" step="any" placeholder={prices[portSellForm.symbol] ? prices[portSellForm.symbol].toFixed(2) : t('marketPriceLabel')}
                                value={portSellForm.price} onChange={(e) => setPortSellForm({...portSellForm, price: e.target.value})}
                                className="bg-[#0B0E14] border border-slate-700 text-white text-sm rounded-lg p-2.5 outline-none font-mono placeholder:text-slate-600"
                              />
                            </div>

                            <div className="flex flex-col">
                              <label className="text-xs text-slate-400 mb-1">{t('tradeDate')}</label>
                              <input 
                                type="date" required
                                value={portSellForm.date} onChange={(e) => setPortSellForm({...portSellForm, date: e.target.value})}
                                className="bg-[#0B0E14] border border-slate-700 text-white text-sm rounded-lg p-2.5 outline-none font-mono"
                              />
                            </div>

                            <div className="flex flex-col">
                              <div className="flex justify-between items-center mb-1">
                                 <label className="text-xs text-slate-400">{t('shares')}</label>
                                 {portSellForm.symbol && (
                                   <button type="button" onClick={() => handleSellAll(portSellForm, setPortSellForm)} className="text-[10px] text-red-400 hover:text-red-300">
                                     {t('sellAll')} ({portfolio[portSellForm.symbol]?.shares || 0})
                                   </button>
                                 )}
                              </div>
                              <input 
                                type="number" min="0.01" step="any" placeholder="จำนวนหุ้น" required
                                value={portSellForm.shares} onChange={(e) => setPortSellForm({...portSellForm, shares: e.target.value})}
                                className="bg-[#0B0E14] border border-slate-700 text-white text-sm rounded-lg p-2.5 outline-none font-mono"
                              />
                            </div>
                          </div>

                          <button type="submit" className="w-full py-3 rounded-lg font-bold text-white transition-all bg-red-600 hover:bg-red-500 shadow-md shadow-red-900/40">
                             {t('sellBtn')} {portSellForm.symbol}
                          </button>
                       </form>
                     </div>

                      {/* Summary Cards */}
                     <h3 className="text-lg md:text-xl font-bold text-white mb-4">{t('compPort')}</h3>
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4 md:mb-6">
                         <div className="p-4 md:p-6 bg-[#1a2133] rounded-2xl border border-slate-700">
                            <div className="text-xs md:text-sm text-slate-400 mb-1 md:mb-2">{t('capInvested')}</div>
                            <div className="text-2xl md:text-3xl font-bold text-white">${portfolioMetrics.totalInvested.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                         </div>
                         <div className="p-4 md:p-6 bg-[#1a2133] rounded-2xl border border-slate-700">
                            <div className="text-xs md:text-sm text-slate-400 mb-1 md:mb-2">{t('currEquity')}</div>
                            <div className="text-2xl md:text-3xl font-bold text-blue-400">${portfolioMetrics.totalValue.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                         </div>
                         <div className="p-4 md:p-6 bg-[#1a2133] rounded-2xl border border-slate-700">
                            <div className="text-xs md:text-sm text-slate-400 mb-1 md:mb-2">{t('unRealized')}</div>
                            <div className={`text-2xl md:text-3xl font-bold ${portfolioMetrics.profitLoss >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                              {portfolioMetrics.profitLoss >= 0 ? '+' : '-'}${Math.abs(portfolioMetrics.profitLoss).toLocaleString(undefined, {minimumFractionDigits: 2})}
                            </div>
                         </div>
                      </div>
                      
                      <div className="overflow-x-auto">
                          <table className="w-full text-sm text-left text-slate-400 whitespace-nowrap">
                            <thead className="text-xs text-slate-500 uppercase bg-[#0B0E14]">
                              <tr>
                                <th className="px-4 md:px-6 py-3 md:py-4">{t('asset')}</th>
                                <th className="px-4 md:px-6 py-3 md:py-4">{t('shares')}</th>
                                <th className="px-4 md:px-6 py-3 md:py-4">{t('avgPrice')}</th>
                                <th className="px-4 md:px-6 py-3 md:py-4">{t('marketPrice')}</th>
                                <th className="px-4 md:px-6 py-3 md:py-4">{t('invested')}</th>
                                <th className="px-4 md:px-6 py-3 md:py-4">Market Value</th>
                                <th className="px-4 md:px-6 py-3 md:py-4 text-right">{t('unRealized')}</th>
                              </tr>
                            </thead>
                            <tbody>
                              {Object.keys(portfolio).length === 0 ? (
                                <tr><td colSpan="7" className="px-6 py-12 text-center text-slate-500">{t('emptyPort')}</td></tr>
                              ) : (
                                Object.values(portfolio).map(item => {
                                  const marketPrice = prices[item.symbol] || item.avgCost; // Fallback
                                  const invested = item.shares * item.avgCost;
                                  const marketVal = item.shares * marketPrice;
                                  const pl = marketVal - invested;
                                  const plPercent = (pl / invested) * 100;
                                  const isProfit = pl >= 0;
                                  return (
                                    <tr key={item.symbol} className="border-b border-slate-800/50 hover:bg-[#1a2133]">
                                      <td className="px-4 md:px-6 py-4 font-bold text-white text-sm md:text-base">{item.symbol}</td>
                                      <td className="px-4 md:px-6 py-4">{item.shares}</td>
                                      <td className="px-4 md:px-6 py-4 font-mono">${item.avgCost.toFixed(2)}</td>
                                      <td className="px-4 md:px-6 py-4 font-mono">${marketPrice.toFixed(2)}</td>
                                      <td className="px-4 md:px-6 py-4 font-mono">${invested.toFixed(2)}</td>
                                      <td className="px-4 md:px-6 py-4 font-medium text-white font-mono">${marketVal.toFixed(2)}</td>
                                      <td className={`px-4 md:px-6 py-4 font-bold font-mono text-right ${isProfit ? 'text-emerald-400' : 'text-red-400'}`}>
                                        {isProfit ? '+' : '-'}${Math.abs(pl).toFixed(2)} <span className="text-xs font-normal">({isProfit ? '+' : ''}{plPercent.toFixed(2)}%)</span>
                                      </td>
                                    </tr>
                                  );
                                })
                              )}
                            </tbody>
                          </table>
                        </div>
                   </div>
                )}

                <footer className="mt-8 pb-4 text-center text-xs text-slate-600 font-medium tracking-wide md:hidden">
                  Developed by นายนพพร สมบูรณ์ชัย
                </footer>

              </main>

              {/* Mobile Bottom Navigation */}
              <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-[#111621] border-t border-slate-800 flex justify-around items-center z-50 pb-safe">
                <NavItemMobile id="dashboard" icon={BookOpen} label={t('dashboard')} />
                <NavItemMobile id="portfolio" icon={PieChart} label={t('portfolio')} />
                <NavItemMobile id="analysis" icon={Crosshair} label={t('analysis')} />
                <NavItemMobile id="history" icon={Clock} label={t('history')} />
              </nav>

            </div>
          );
        }

        // --- Render App ---
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
